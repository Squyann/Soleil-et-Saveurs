<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 64" width="300" height="64">
  <!-- Orange rounded square background -->
  <rect x="0" y="0" width="64" height="64" rx="12" fill="#FF4500"/>

  <!-- Sun: center circle -->
  <circle cx="32" cy="32" r="9" fill="white"/>

  <!-- Sun rays (8 directions) -->
  <line x1="32" y1="9"  x2="32" y2="16" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="32" y1="48" x2="32" y2="55" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="9"  y1="32" x2="16" y2="32" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="48" y1="32" x2="55" y2="32" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="15.5" y1="15.5" x2="20.5" y2="20.5" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="43.5" y1="43.5" x2="48.5" y2="48.5" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="48.5" y1="15.5" x2="43.5" y2="20.5" stroke="white" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="20.5" y1="43.5" x2="15.5" y2="48.5" stroke="white" stroke-width="2.8" stroke-linecap="round"/>

  <!-- Text: SOLEIL (regular weight) + SAVEURS (black weight) -->
  <text x="80" y="41"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="24"
    font-weight="400"
    fill="#1e293b"
    letter-spacing="2">SOLEIL</text>
  <text x="193" y="41"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="24"
    font-weight="900"
    fill="#1e293b"
    letter-spacing="2">SAVEURS</text>
</svg>
